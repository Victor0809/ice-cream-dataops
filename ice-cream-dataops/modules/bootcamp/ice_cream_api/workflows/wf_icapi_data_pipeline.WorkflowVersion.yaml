workflowExternalId: wf_icapi_data_pipeline
version: '1'
workflowDefinition:
  tasks:
    - externalId: 'create_asset_hierarchy_transformation_task'
      type: 'transformation'
      parameters:
        transformation:
          externalId: create_asset_hierarchy
          concurrencyPolicy: fail
      name: 'CREATE ASSET HIERARCHY'
      description: Second task
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'      

    - externalId: 'contextualize_ts_assets_transformation_task'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'contextualize_ts_assets'
          concurrencyPolicy: fail
      name: 'CONTEXTUALIZE TIMESERIES ASSETS'
      description: Second task
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'        
      dependsOn:
        - externalId: create_asset_hierarchy_transformation_task          

    - externalId: icapi_datapoints_extractor_task
      type: function
      parameters:
        function:
          externalId: icapi_datapoints_extractor
          # data: { "hours": 1 }
      name: 'EXTRACT ICE CREAM DATAPOINTS'
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: contextualize_ts_assets_transformation_task

    - externalId: oee_timeseries_task
      type: function
      parameters:
        function:
          externalId: oee_timeseries
          # data: { "hours": 1 }
      name: 'CALCULATE OEE TIMESERIES'
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: icapi_datapoints_extractor_task